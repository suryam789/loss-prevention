# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: trivy_image_scan

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main


permissions:
  contents: read

jobs:
    trivy_image_scan_lossprevention:
      permissions:
        contents: read # for actions/checkout to fetch code
        security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
        actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
      name: trivy_image_scan
      runs-on: "ubuntu-24.04-4core-150GB"
      steps:
        - name: Checkout code
          uses: actions/checkout@1e31de5234b9f8995739874a8ce0492dc87873e2
          with:
            ref: main
        - name: Read VERSION
          shell: bash
          run: |
            VERSION="$(cat VERSION | tr -d '\n\r' | xargs)"
            echo "VERSION=$VERSION" >> "$GITHUB_ENV"
            echo "Using VERSION=$VERSION"
            
        - name: Update Sub Module Performance-Tools
          run: make update-submodules
          
        - name: Build and Run Model Downloader image from Dockerfile
          run: |
            echo "running make build-model-downloader"
            make build-model-downloader
            make run-model-downloader

        - name: Build Pipeline Runner image from Dockerfile
          run: |
            echo "running make build-pipeline-runner"
            make build-lp-images
            sudo du -sh /* 2>/dev/null | sort -rh | head -n 10
            sudo df -h

        - name: Run Trivy vulnerability scanner on model-downloader
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
          with:
            image-ref: "intel/model-downloader:${{ env.VERSION }}"
            format: 'table'
            output: 'trivy-results-modeldownloader.txt'
            severity: 'CRITICAL,HIGH'

        - name: Run Trivy vulnerability scanner on pipeline-runner
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
          with:
            image-ref: "intel/pipeline-runner-lp:${{ env.VERSION }}"
            format: 'table'
            output: 'trivy-results-pipelinerunner.txt'
            severity: 'CRITICAL,HIGH'

        - name: Run Trivy vulnerability scanner on lp vlm workload handler
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
          with:
            image-ref: "intel/lp-vlm-workload-handler:${{ env.VERSION }}"
            format: 'table'
            output: 'trivy-results-lp-vlm-workload-handler.txt'
            severity: 'CRITICAL,HIGH'
            
        - name: Run Trivy vulnerability scanner on rtsp-streamer
          uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1
          with:
            image-ref: "intel/rtsp-streamer:${{ env.VERSION }}"
            format: 'table'
            output: 'trivy-results-lp-rtsp-streamer.txt'
            severity: 'CRITICAL,HIGH'
            
        - name: Upload Trivy scan results for model-downloader to GitHub Security tab
          uses: actions/upload-artifact@v4
          with:
            name: trivy-loss-prevention-report
            path: |
              trivy-results-modeldownloader.txt
              trivy-results-pipelinerunner.txt
              trivy-results-lp-vlm-workload-handler.txt
              trivy-results-lp-rtsp-streamer.txt

